---
services:
  course-enrollment-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: course-enrollment-app
    ports:
      - 5000:5000
    volumes:
      - .:/app
    environment:
      - FLASK_DEBUG=true
      - MONGO_URI=mongodb://mongodb:27017/NOU_Enrollment
      - SECRET_KEY=local-dev-secret-change-in-production
    depends_on:
      - mongodb
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/index').read()",
        ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  mongodb:
    image: mongo:8.2
    container_name: mongodb
    environment:
      - PUID=1000
      - PGID=1000
    volumes:
      - mongodb:/data/db
    ports:
      - 27017:27017
    restart: unless-stopped

  mongo-seed:
    image: mongo:8.2
    container_name: mongo-setup
    links:
      - mongodb
    volumes:
      - ./mongo-setup:/mongo-setup:rw
    command:
      /mongo-setup/mongo-setup.sh

  e2e-tests:
    image: mcr.microsoft.com/playwright:v1.58.2-noble
    working_dir: /work
    volumes:
      - .:/work
    environment:
      - PLAYWRIGHT_BASE_URL=http://course-enrollment-app:5000
      - PW_FAST_INPUT=1
    depends_on:
      course-enrollment-app:
        condition: service_healthy
    command: >
      sh -lc "npm ci && npx playwright test e2e/ui-walkthrough.spec.js --project=chromium"

volumes:
  mongodb:
  mongo-setup:
