---
name: ci
on:  # yamllint disable-line rule:truthy
  push:
    branches: [main]
  pull_request:
    branches: [main]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-python@v6.2.0
      - uses: pre-commit/action@v3.0.1

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Run test suite
        run: pytest --cov=application --cov-report=term-missing --cov-report=xml --cov-fail-under=100
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5.5.2
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Build Docker image using Docker Compose
        run: docker compose build course-enrollment-app

  e2e-docker:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Build and start app services
        run: docker compose up -d --build course-enrollment-app mongodb
      - name: Seed MongoDB data
        run: docker compose run --rm mongo-seed
      - name: Run Dockerized e2e walkthrough
        run: docker compose run --rm e2e-tests
      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7.0.0
        with:
          name: playwright-artifacts
          path: |
            playwright-report
            test-results
      - name: Stop services
        if: always()
        run: docker compose down --remove-orphans
