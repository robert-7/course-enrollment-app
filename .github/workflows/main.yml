---
name: ci
on:  # yamllint disable-line rule:truthy
  push:
    branches: [main]
  pull_request:
    branches: [main]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-python@v6.2.0
      - uses: pre-commit/action@v3.0.1

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Run test suite
        run: pytest --cov=application --cov-report=term-missing --cov-report=xml --cov-fail-under=100
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5.5.2
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Build Docker image using Docker Compose
        run: docker compose build course-enrollment-app

  e2e-docker:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Build and start app services
        run: docker compose up -d --build course-enrollment-app mongodb
      - name: Seed MongoDB data
        run: docker compose run --rm mongo-seed
      - name: Run Dockerized e2e walkthrough
        run: docker compose run --rm e2e-tests
      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7.0.0
        with:
          name: playwright-artifacts
          path: |
            playwright-report
            test-results
      - name: Stop services
        if: always()
        run: docker compose down --remove-orphans

  deploy:
    name: Deploy to AWS ECS
    runs-on: ubuntu-latest
    needs: [lint, test, docker-build, e2e-docker]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      id-token: write
      contents: read
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      ECR_REGISTRY: ${{ vars.ECR_REGISTRY }}
      ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
      ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}
      ECS_SERVICE: ${{ vars.ECS_SERVICE }}
      IMAGE_TAG: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Validate deploy configuration
        env:
          AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
        run: |
          : "${AWS_ROLE_ARN:?Missing GitHub secret AWS_ROLE_ARN}"
          : "${AWS_REGION:?Missing GitHub variable AWS_REGION}"
          : "${ECR_REGISTRY:?Missing GitHub variable ECR_REGISTRY}"
          : "${ECR_REPOSITORY:?Missing GitHub variable ECR_REPOSITORY}"
          : "${ECS_CLUSTER:?Missing GitHub variable ECS_CLUSTER}"
          : "${ECS_SERVICE:?Missing GitHub variable ECS_SERVICE}"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          IMAGE_URI: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
        run: |
          docker build -t "$IMAGE_URI" .
          docker push "$IMAGE_URI"

      - name: Load current ECS task definition
        id: task-def
        run: |
          CURRENT_TASK_DEF_ARN="$(aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE" \
            --query 'services[0].taskDefinition' \
            --output text)"
          aws ecs describe-task-definition \
            --task-definition "$CURRENT_TASK_DEF_ARN" \
            --query taskDefinition \
            > task-definition-full.json
          jq 'del(
            .taskDefinitionArn,
            .revision,
            .status,
            .requiresAttributes,
            .compatibilities,
            .registeredAt,
            .registeredBy
          )' task-definition-full.json > task-definition.json
          echo "container_name=$(jq -r '.containerDefinitions[0].name' task-definition.json)" >> "$GITHUB_OUTPUT"

      - name: Render new ECS task definition
        id: render-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ steps.task-def.outputs.container_name }}
          image: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
